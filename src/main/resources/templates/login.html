<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in • Sudoku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="container auth-container">
        <div class="topbar">
            <div class="brand">
                <h1 class="glitch-title">Sudoku</h1>
                <p class="subtitle">Sign in to continue</p>
            </div>
        </div>

        <div th:if="${param.logout}" class="message info">Signed out successfully.</div>
        <div th:if="${param.registered}" class="message success">Account created. Please sign in.</div>
        <div th:if="${param.error}" class="message error">Invalid username or password.</div>

        <div class="auth-card">
            <form class="auth-form" th:action="@{/login}" method="post" autocomplete="on">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label class="auth-label" for="username">Username</label>
                <input class="auth-input" id="username" name="username" type="text" autofocus required />

                <label class="auth-label" for="password">Password</label>
                <input class="auth-input" id="password" name="password" type="password" required />

                <button class="btn btn-primary auth-submit" type="submit">Sign in</button>
            </form>
        </div>

        <p class="auth-hint">
            New here? <a class="auth-link" th:href="@{/signup}">Create an account</a>
        </p>
    </div>
</body>

</html>
