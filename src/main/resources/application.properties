spring.application.name=sudoku-solver
server.port=8080
spring.thymeleaf.cache=false
logging.level.root=INFO
logging.level.com.sudoku=DEBUG
spring.devtools.restart.enabled=false

# Default seeded user (created on startup if missing)
app.auth.username=admin
app.auth.password=admin123

# H2 database (file-based) for signup users
spring.datasource.url=jdbc:h2:file:./data/sudoku-users;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
